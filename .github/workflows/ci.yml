name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Check formatting
        run: uv run --group dev ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Django system check
        run: uv run python manage.py check

      - name: Run tests
        run: uv run --group dev pytest --junitxml=test-results.xml -v

      - name: Test report summary
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build Docker image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: bashorg-like:${{ github.sha }}
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,scope=docker-build,mode=max
