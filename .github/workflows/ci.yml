name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Check formatting
        run: uv run --group dev ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Django system check
        run: uv run python manage.py check

      - name: Run tests
        run: uv run --group dev pytest --junitxml=test-results.xml -v

      - name: Test report summary
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t bashorg-like:${{ github.sha }} .

      - name: Tag as latest (master push only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: docker tag bashorg-like:${{ github.sha }} bashorg-like:latest
