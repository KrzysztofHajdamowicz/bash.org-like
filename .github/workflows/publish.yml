name: Publish

# Runs on pushes to master (after CI passes) and on version tags
on:
  push:
    branches: [master]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  # Wait for CI to pass before publishing
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      packages: write        # Push to GHCR
      id-token: write        # Sigstore signing for attestations
      attestations: write    # Upload attestations to GitHub

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # OCI image references must be lowercase. github.repository preserves
      # original casing (e.g. "KrzysztofHajdamowicz/bash.org-like") which
      # breaks Syft and other OCI-compliant tools.
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # ── Docker metadata (tags + labels) ──
      # This action generates Docker tags and OCI labels from git context.
      # For a push to master:  ghcr.io/yourname/bash.org-like:master, :sha-abc1234
      # For a tag v1.2.3:      ghcr.io/yourname/bash.org-like:1.2.3, :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.authors=Krzysztof Hajdamowicz
            org.opencontainers.image.vendor=Krzysztof Hajdamowicz
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.base.name=docker.io/library/python:3.14-slim

      # ── Log in to GHCR ──
      # GITHUB_TOKEN is automatically provided by GitHub Actions.
      # No secrets to configure — it just works.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      # ── Build and push ──
      # Builds a multi-arch manifest (amd64 + arm64) and pushes to ghcr.io.
      # QEMU handles cross-compilation for the non-native platform.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,scope=docker-build,mode=max

      # ── SBOM: Docker image ──
      # Scans the pushed image for ALL packages: OS (apt), Python, etc.
      # Produces a CycloneDX JSON file — the standard for container SBOMs.
      - name: Generate Docker image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-docker.cyclonedx.json

      # ── SBOM: Python source dependencies ──
      # Scans the repo directory for Python dependencies (pyproject.toml / uv.lock).
      # This is the SBOM for people who run from source without Docker.
      - name: Generate Python source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-python.cyclonedx.json

      # ── Attestations ──
      # Cryptographically signs the image digest with Sigstore, proving:
      # 1. Build provenance — this image was built by THIS workflow in THIS repo
      # 2. SBOM — these are the components inside the image
      # Consumers verify with: gh attestation verify oci://ghcr.io/yourname/bash.org-like:latest --owner yourname
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker image SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-docker.cyclonedx.json
          push-to-registry: true

      - name: Attest Python source SBOM
        uses: actions/attest@v4
        with:
          subject-path: sbom-python.cyclonedx.json

      # ── Upload SBOMs as workflow artifacts ──
      # Makes them downloadable from the Actions run summary page.
      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: |
            sbom-docker.cyclonedx.json
            sbom-python.cyclonedx.json

      # ── GitHub Release (tags only) ──
      # Creates a draft release with SBOMs attached and Docker pull instructions.
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename SBOMs for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp sbom-docker.cyclonedx.json "SBOM-Docker-${{ steps.version.outputs.version }}.cyclonedx.json"
          cp sbom-python.cyclonedx.json "SBOM-Python-${{ steps.version.outputs.version }}.cyclonedx.json"

      - name: Get previous tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
          else
            echo "range=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          RANGE="${{ steps.prev_tag.outputs.range }}"
          if [ -z "$RANGE" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" "$RANGE")
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "## Docker"
            echo ""
            echo "Docker image is available at GHCR:"
            echo ""
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
            echo '```'
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            SBOM-Docker-${{ steps.version.outputs.version }}.cyclonedx.json
            SBOM-Python-${{ steps.version.outputs.version }}.cyclonedx.json
